<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Reabrir Período</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-voltar {
            background: #6c757d;
            margin-top: 10px;
        }
        .btn-voltar:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 Reabrir Período</h2>
        <form method="POST">
            <label>Trimestre</label>
            <select name="trimestre" required>
                <option value="T1">1º Trimestre</option>
                <option value="T2">2º Trimestre</option>
                <option value="T3">3º Trimestre</option>
            </select>
            
            <label>Dias adicionais</label>
            <input type="number" name="dias" min="1" max="60" value="15" required>
            
            <button type="submit">Reabrir Período</button>
        </form>
        <form action="/admin">
            <button type="submit" class="btn-voltar">← Voltar</button>
        </form>
    </div>
</body>
</html>
