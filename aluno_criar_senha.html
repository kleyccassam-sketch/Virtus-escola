<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criar Senha</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 450px; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6c757d; margin-bottom: 25px; font-size: 14px; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2196f3; }
        .info p { margin: 5px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        button { width: 100%; background: #2563eb; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #1d4ed8; }
        .erro { color: #721c24; background: #f8d7da; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #f5c6cb; }
        .sucesso { color: #155724; background: #d4edda; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #c3e6cb; text-align: center; }
        .sucesso strong { display: block; font-size: 18px; margin: 5px 0; }
        .links { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd; }
        .links a { color: #2563eb; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Criar Minha Senha</h1>
        <p class="subtitle">Crie sua senha para acessar o portal do aluno</p>
        
        {% if erro %}
        <div class="erro">{{ erro }}</div>
        {% endif %}
        
        {% if sucesso %}
        <div class="sucesso">
            <strong>✅ {{ sucesso }}</strong>
            <p style="margin-top: 10px;">
                <a href="/aluno/login" style="color: #155724; font-weight: bold;">Clique aqui para fazer login</a>
            </p>
        </div>
        {% endif %}
        
        <div class="info">
            <p><strong>👤 Nome:</strong> {{ nome }}</p>
            <p><strong>🏫 Turma:</strong> {{ turma }}</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>🔒 Nova Senha (mínimo 4 caracteres):</label>
                <input type="password" name="nova_senha" required minlength="4">
            </div>
            <div class="form-group">
                <label>✅ Confirmar Senha:</label>
                <input type="password" name="confirmar_senha" required>
            </div>
            <button type="submit">🔑 Criar Minha Senha</button>
        </form>
        
        <div class="links">
            <a href="/aluno">← Voltar</a>
        </div>
    </div>
</body>
</html>
