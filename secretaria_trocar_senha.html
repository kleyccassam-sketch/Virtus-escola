<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Trocar Senha - Secretaria</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2c3e50, #3498db);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:380px;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#2c3e50;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#3498db;
    box-shadow:0 0 5px rgba(52,152,219,0.5);
}

button{
    width:100%;
    padding:12px;
    background:#3498db;
    border:none;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2980b9;
    transform:scale(1.02);
}

.msg-erro{
    color:red;
    margin-bottom:10px;
    font-size:14px;
}

.msg-sucesso{
    color:green;
    margin-bottom:10px;
    font-size:14px;
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}

</style>

</head>
<body>

<div class="card">

    <div class="icon">🔐</div>

    <h2>Trocar Senha</h2>

    {% if erro %}
        <div class="msg-erro">{{ erro }}</div>
    {% endif %}

    {% if sucesso %}
        <div class="msg-sucesso">{{ sucesso }}</div>
    {% endif %}

    <form method="POST">

        <input type="password" name="senha_atual" placeholder="Senha atual" required>

        <input type="password" name="nova_senha" placeholder="Nova senha" required>

        <input type="password" name="confirmar_senha" placeholder="Confirmar nova senha" required>

        <button type="submit">Atualizar Senha</button>

    </form>

</div>

</body>
</html>
