<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login do Aluno</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 400px; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #1e3a8a; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2196f3; }
        .info p { margin: 5px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        button { width: 100%; background: #2563eb; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #1d4ed8; }
        .erro { color: #721c24; background: #f8d7da; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #f5c6cb; }
        .links { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #ddd; }
        .links a { color: #2563eb; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔓 Login do Aluno</h1>
        
        {% if erro %}
        <div class="erro">{{ erro }}</div>
        {% endif %}
        
        <div class="info">
            <p><strong>👤 Nome:</strong> {{ nome }}</p>
            <p><strong>🏫 Turma:</strong> {{ turma }}</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>🔒 Senha:</label>
                <input type="password" name="senha" required>
            </div>
            <button type="submit">🔓 Entrar</button>
        </form>
        
        <div class="links">
            <a href="/aluno">← Voltar</a>
        </div>
    </div>
</body>
</html>
